<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
body, html { margin:0; padding:0; height:100%; }
#map { height:100%; width:100%; }
#status { position:absolute; top:10px; left:10px; z-index:1000; background:white; padding:10px; border-radius:5px; box-shadow:0 0 5px rgba(0,0,0,0.3); font-size:14px; font-weight:bold; }
.zone-label { color:yellow; font-weight:bold; font-size:16px; text-shadow:1px 1px 2px black; }
#btn { position:absolute; bottom:30px; right:20px; z-index:1000; width:60px; height:60px; background:#2196F3; border-radius:50%; color:white; font-size:25px; border:none; box-shadow:0 0 10px rgba(0,0,0,0.5); }
</style>
</head>
<body>
<div id="status">GPS 신호 수신 대기 중...</div>
<button id="btn" onclick="locate()">🎯</button>
<div id="map"></div>
<script>
var map = L.map('map').setView([36.8522, 126.8610], 18);
// 위성 지도 서버로 원상 복구
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

var marker = L.circleMarker([0,0], {radius:8, fillColor:'#00FF00', fillOpacity:1, color:'#fff', weight:2}).addTo(map);
var statusDiv = document.getElementById('status');

var zones = [
{name:"PA", coords:[[36.8535,126.8595],[36.8535,126.8614],[36.8526,126.8614],[36.8526,126.8595]], label:[36.8530,126.8604]},
{name:"P", coords:[[36.8525,126.8603],[36.8525,126.8614],[36.8519,126.8614],[36.8519,126.8603]], label:[36.8522,126.8608]},
{name:"Y", coords:[[36.8519,126.8580],[36.8519,126.8592],[36.8495,126.8592],[36.8495,126.8580]], label:[36.8507,126.8586]},
{name:"C", coords:[[36.8519,126.8592],[36.8519,126.8604],[36.8495,126.8604],[36.8495,126.8592]], label:[36.8507,126.8598]},
{name:"B", coords:[[36.8519,126.8604],[36.8519,126.8616],[36.8495,126.8616],[36.8495,126.8604]], label:[36.8507,126.8610]},
{name:"A", coords:[[36.8519,126.8616],[36.8519,126.8628],[36.8495,126.8628],[36.8495,126.8616]], label:[36.8507,126.8622]},
{name:"수출", coords:[[36.8495,126.8592],[36.8495,126.8628],[36.8470,126.8628],[36.8470,126.8592]], label:[36.8482,126.8610]},
{name:"R", coords:[[36.8519,126.8640],[36.8519,126.8665],[36.8495,126.8665],[36.8495,126.8640]], label:[36.8507,126.8652]},
{name:"K", coords:[[36.8495,126.8640],[36.8495,126.8665],[36.8470,126.8665],[36.8470,126.8640]], label:[36.8482,126.8652]},
{name:"J", coords:[[36.8519,126.8665],[36.8519,126.8690],[36.8495,126.8690],[36.8495,126.8665]], label:[36.8507,126.8677]},
{name:"I", coords:[[36.8495,126.8665],[36.8495,126.8690],[36.8470,126.8690],[36.8470,126.8665]], label:[36.8482,126.8677]},
{name:"HB", coords:[[36.8519,126.8700],[36.8519,126.8725],[36.8500,126.8725],[36.8500,126.8700]], label:[36.8509,126.8712]},
{name:"HA", coords:[[36.8500,126.8700],[36.8500,126.8725],[36.8485,126.8725],[36.8485,126.8700]], label:[36.8492,126.8712]},
{name:"H", coords:[[36.8485,126.8700],[36.8485,126.8725],[36.8470,126.8725],[36.8470,126.8700]], label:[36.8477,126.8712]},
{name:"N/M/L", coords:[[36.8470,126.8670],[36.8470,126.8725],[36.8450,126.8725],[36.8450,126.8670]], label:[36.8460,126.8697]}
];

zones.forEach(z => {
L.polygon(z.coords, {color:'yellow', weight:2}).addTo(map);
L.marker(z.label, {icon:L.divIcon({className:'zone-label', html:z.name})}).addTo(map);
});

function locate() {
statusDiv.innerHTML = "GPS 신호 수신 중...";
navigator.geolocation.watchPosition(p => {
marker.setLatLng([p.coords.latitude, p.coords.longitude]);
map.setView([p.coords.latitude, p.coords.longitude], 19);
statusDiv.innerHTML = "현재 위치 수신 완료";
}, e => {
statusDiv.innerHTML = "GPS 오류: 위치 정보를 가져올 수 없습니다.";
}, {enableHighAccuracy:true});
}
</script>
</body>
</html>
